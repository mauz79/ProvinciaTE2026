<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST - Terminale Spoglio</title>
    <style>
        :root { --azione: #8A2BE2; --territorio: #00BFFF; --comuni: #CD5C5C; --dangelo: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; text-align: center; margin: 0; padding: 20px; padding-top: 60px; display: flex; flex-direction: column; min-height: 100vh;}
        
        /* BANNER DI TEST */
        .test-banner { position: fixed; top: 0; left: 0; width: 100%; background: #c0392b; color: white; padding: 10px 0; font-weight: bold; font-size: 18px; z-index: 999999; animation: flash 2s infinite; letter-spacing: 2px;}
        @keyframes flash { 0%, 100% { background-color: #c0392b; } 50% { background-color: #e74c3c; } }

        .main-content { flex: 1; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; text-transform: uppercase;}
        h3.subtitle { color: #7f8c8d; font-size: 15px; margin-top: 0; margin-bottom: 30px; font-weight: normal; }
        
        .step { display: none; animation: fadeIn 0.2s; max-width: 500px; margin: auto; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn-colonna { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        
        button {
            padding: 18px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px;
            color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; text-align: center; transition: transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        
        button.fascia-a { background-color: #4da6ff; }
        button.fascia-b { background-color: #ff9933; }
        button.fascia-c { background-color: #999999; }
        button.fascia-d { background-color: #cc0000; }
        button.fascia-e { background-color: #33cc33; }
        
        button.lista-azione { background-color: var(--azione); }
        button.lista-territorio { background-color: var(--territorio); color: #000; }
        button.lista-comuni { background-color: var(--comuni); }
        button.lista-dangelo { background-color: var(--dangelo); color: #2c3e50; border: 2px solid #ccc; }
        
        button.cand-btn { background-color: #34495e; }
        button.yellow { background-color: #f1c40f; color: #2c3e50; }
        button.red { background-color: #e74c3c; }
        button.gray { background-color: #95a5a6; }
        button.nav-btn { background-color: #ecf0f1; color: #333; margin-top: 15px; border: 2px dashed #bdc3c7;}
        button.danger { background-color: #c0392b; margin-top: 60px; font-size: 15px;}
        button.config-btn { background-color: #2980b9; font-size: 15px; margin-top: 20px;}

        .info-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 18px; font-weight: bold; border-left: 6px solid #2c3e50; text-align: left;}
        
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #2c3e50; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; color: white;}
        #login-screen input { padding: 16px; font-size: 20px; border-radius: 8px; border: none; margin-bottom: 20px; text-align: center; width: 80%; max-width: 300px;}
        #login-screen button { width: 80%; max-width: 300px; background: #27ae60; }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #2ecc71; color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; font-size: 18px;}
        .toast.error { background: #e74c3c; } .toast.warning { background: #f39c12; }

        .btn-counter { display: block; font-size: 13px; font-weight: normal; margin-top: 4px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; width: fit-content; margin-left: auto; margin-right: auto;}
    </style>
</head>
<body>

    <div class="test-banner">⚠️ AMBIENTE DI TEST - SIMULAZIONE IN CORSO ⚠️</div>

    <div id="login-screen">
        <div class="test-banner">⚠️ AMBIENTE DI TEST - SIMULAZIONE IN CORSO ⚠️</div>
        <h2 style="font-size: 28px; margin-bottom: 5px;">🔒 Accesso Prova</h2>
        <p style="margin-bottom: 30px; font-size: 16px; color: #e74c3c; font-weight:bold;">PASSWORD: test2026</p>
        <input type="password" id="pass-input" placeholder="Password...">
        <button onclick="sblocca()">SBLOCCA TERMINALE TEST</button>
    </div>

    <div class="main-content">
        <h1>Terminale di Prova</h1>
        <h3 class="subtitle">I dati inseriti qui NON intaccano il database ufficiale</h3>
        
        <div id="step1" class="step">
            <div class="btn-colonna">
                <button class="fascia-a" onclick="scegliFascia('Fascia A (Azzurra)')">Fascia A (Azzurra) <span class="btn-counter" id="cnt-Fascia A (Azzurra)">Caricamento...</span></button>
                <button class="fascia-b" onclick="scegliFascia('Fascia B (Arancione)')">Fascia B (Arancione) <span class="btn-counter" id="cnt-Fascia B (Arancione)">Caricamento...</span></button>
                <button class="fascia-c" onclick="scegliFascia('Fascia C (Grigia)')">Fascia C (Grigia) <span class="btn-counter" id="cnt-Fascia C (Grigia)">Caricamento...</span></button>
                <button class="fascia-d" onclick="scegliFascia('Fascia D (Rossa)')">Fascia D (Rossa) <span class="btn-counter" id="cnt-Fascia D (Rossa)">Caricamento...</span></button>
                <button class="fascia-e" onclick="scegliFascia('Fascia E (Verde)')">Fascia E (Verde) <span class="btn-counter" id="cnt-Fascia E (Verde)">Caricamento...</span></button>
            </div>
            <button class="config-btn" onclick="impostaVotanti()">⚙️ Imposta Votanti Effettivi (Opzionale)</button>
            <button class="yellow" style="margin-top: 20px;" onclick="annullaUltimo()">↩ Annulla Ultimo Voto</button>
            <button class="danger" onclick="resetTotale()">⚠️ AZZERA DATABASE DI TEST</button>
        </div>

        <div id="step2" class="step">
            <div class="info-box">Fascia: <span id="lbl-fascia" style="color:#e74c3c; float:right;"></span></div>
            <div class="btn-colonna">
                <button class="lista-azione" onclick="scegliScelta('Azione con Calenda')">Azione con Calenda</button>
                <button class="lista-territorio" onclick="scegliScelta('La Forza del Territorio')">La Forza del Territorio</button>
                <button class="lista-comuni" onclick="scegliScelta('La Casa dei Comuni')">La Casa dei Comuni</button>
                <button class="lista-dangelo" onclick="scegliScelta('Con D\'Angelo Presidente')">Con D'Angelo Presidente</button>
                <hr style="width:100%; border:1px solid #ddd; margin: 5px 0;">
                <button class="gray" onclick="inviaVoto('Scheda Bianca', 'Nessuna preferenza')">Scheda Bianca</button>
                <button class="red" onclick="inviaVoto('Scheda Nulla', 'Nessuna preferenza')">Scheda Nulla</button>
                <button class="nav-btn" onclick="tornaFasce()">⬅ Torna alle Fasce</button>
            </div>
        </div>

        <div id="step3" class="step">
            <div class="info-box">Lista: <span id="lbl-lista" style="color:#e74c3c; float:right;"></span></div>
            <div class="btn-colonna">
                <button class="yellow" onclick="inviaVoto(sceltaTemp, 'NESSUNA PREFERENZA')">SOLO VOTO DI LISTA</button>
                <hr style="width:100%; border:1px solid #ddd; margin: 5px 0;">
                <div id="candidati-container" class="btn-colonna"></div>
                <button class="nav-btn" onclick="tornaListe()">⬅ Torna alle Liste</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbzk_QbhOYYdUj6bQNhghFZhH-WgBt3VT6xiVMeh-zhpNxXGcP_wRtq4-gOYkNCTp8OJ/exec';
        
        let sysPassword = '';
        
        const AVENTI_DIRITTO = { "Fascia A (Azzurra)": 253, "Fascia B (Arancione)": 52, "Fascia C (Grigia)": 130, "Fascia D (Rossa)": 136, "Fascia E (Verde)": 33 };
        let votantiEffettivi = { ...AVENTI_DIRITTO };
        let spoglioAttuale = { "Fascia A (Azzurra)": 0, "Fascia B (Arancione)": 0, "Fascia C (Grigia)": 0, "Fascia D (Rossa)": 0, "Fascia E (Verde)": 0 };

        const databaseListe = {
            "Azione con Calenda": ["1 - Maiocco Sebastian", "2 - Graziosi Alessandro", "3 - Di Pietrangelo Chiara", "4 - Addazii Vincenzo", "5 - Recchiuti Gabriella", "6 - Del Principe Mario", "7 - Di Felice Simona"],
            "La Forza del Territorio": ["1 - Adriani Pietro", "2 - Cianella Maria Cristina", "3 - Giansante Luciano", "4 - Altitonante Fabio", "5 - Ciprietti Nadia", "6 - Gatti Danilo", "7 - Intini Federica", "8 - Provvisiero Caterina", "9 - Trosini Ettore", "10 - Valentini Bruno"],
            "La Casa dei Comuni": ["1 - De Ascaniis Fausta", "2 - Di Vincenzo Elodia", "3 - Illuminati Marta", "4 - Ioannone Dino", "5 - Tribuiani Paolo", "6 - Varani Massimo"],
            "Con D'Angelo Presidente": ["1 - D'Angelo Simona", "2 - Di Romualdo Giovanna", "3 - Di Sabatino Humberto Elio Roberto", "4 - Giosia Berardo", "5 - Lattanzi Luca", "6 - Marziani Giuseppe", "7 - Piccioni Teodora"]
        };

        let fasciaTemp = ''; let sceltaTemp = '';

        document.getElementById("pass-input").addEventListener("keypress", function(e) { if (e.key === "Enter") sblocca(); });

        function sblocca() {
            sysPassword = document.getElementById('pass-input').value;
            if(sysPassword === 'test2026') {
                document.getElementById('login-screen').style.display = 'none';
                cambiaStep('step1');
                sincronizzaContatori(); 
                setInterval(sincronizzaContatori, 10000); 
            } else { alert("Password di test errata (usa 'test2026')."); document.getElementById('pass-input').value = '';}
        }

        function mostraToast(msg, tipo = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`; toast.innerText = msg;
            container.appendChild(toast); setTimeout(() => toast.remove(), 2500);
        }

        function sincronizzaContatori() {
            fetch(GOOGLE_API_URL).then(r => r.json()).then(righe => {
                let tempSpoglio = { "Fascia A (Azzurra)": 0, "Fascia B (Arancione)": 0, "Fascia C (Grigia)": 0, "Fascia D (Rossa)": 0, "Fascia E (Verde)": 0 };
                let tempVotanti = { ...AVENTI_DIRITTO };
                
                righe.forEach(r => {
                    let f = r[1], l = r[2], d = r[3];
                    if(l === 'CONFIG_VOTANTI') { tempVotanti[f] = parseInt(d); return; }
                    if(f && tempSpoglio[f] !== undefined) tempSpoglio[f]++;
                });
                votantiEffettivi = tempVotanti; spoglioAttuale = tempSpoglio;
                Object.keys(spoglioAttuale).forEach(f => {
                    let el = document.getElementById(`cnt-${f}`);
                    if(el) el.innerText = `${spoglioAttuale[f]} / ${votantiEffettivi[f]}`;
                });
            }).catch(e => console.log("Errore sync"));
        }

        function impostaVotanti() {
            let f = prompt("Quale fascia vuoi modificare?\nDigita A, B, C, D o E:");
            if(!f) return;
            let mapFasce = { 'A':'Fascia A (Azzurra)', 'B':'Fascia B (Arancione)', 'C':'Fascia C (Grigia)', 'D':'Fascia D (Rossa)', 'E':'Fascia E (Verde)' };
            let fasciaScelta = mapFasce[f.toUpperCase()];
            if(!fasciaScelta) { alert("Fascia non valida."); return; }
            
            let num = prompt(`Inserisci il numero dei VOTANTI per la ${fasciaScelta}:`);
            if(!num || isNaN(num)) return;

            mostraToast("Salvataggio Votanti...", "warning");
            fetch(GOOGLE_API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ action: 'insert', fascia: fasciaScelta, scelta: 'CONFIG_VOTANTI', dettaglio: parseInt(num) }) 
            }).then(() => { mostraToast("Configurazione Salvata!", "success"); sincronizzaContatori(); });
        }

        function cambiaStep(stepId) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function scegliFascia(fascia) { 
            if(spoglioAttuale[fascia] >= votantiEffettivi[fascia]) {
                let forza = confirm(`⚠️ ATTENZIONE ⚠️\nHai già inserito ${spoglioAttuale[fascia]} voti su ${votantiEffettivi[fascia]} votanti per questa fascia!\nForzare l'inserimento di un'altra scheda?`);
                if(!forza) return;
            }
            fasciaTemp = fascia; 
            document.getElementById('lbl-fascia').innerText = fascia.split(' ')[0] + ' ' + fascia.split(' ')[1]; 
            cambiaStep('step2'); 
        }
        
        function tornaFasce() { fasciaTemp = ''; cambiaStep('step1'); }
        function tornaListe() { sceltaTemp = ''; cambiaStep('step2'); }

        function scegliScelta(scelta) {
            sceltaTemp = scelta; document.getElementById('lbl-lista').innerText = scelta;
            const container = document.getElementById('candidati-container');
            container.innerHTML = ''; 
            databaseListe[scelta].forEach(candidato => {
                const btn = document.createElement('button');
                btn.className = 'cand-btn'; btn.innerText = candidato; 
                btn.onclick = () => inviaVoto(scelta, candidato);
                container.appendChild(btn);
            });
            cambiaStep('step3');
        }

        function inviaVoto(sceltaFinale, dettaglio) {
            const payload = { action: 'insert', fascia: fasciaTemp, scelta: sceltaFinale, dettaglio: dettaglio };
            tornaFasce(); mostraToast('VOTO TEST INVIATO', 'success');
            if(spoglioAttuale[fasciaTemp] !== undefined) spoglioAttuale[fasciaTemp]++;
            let el = document.getElementById(`cnt-${fasciaTemp}`);
            if(el) el.innerText = `${spoglioAttuale[fasciaTemp]} / ${votantiEffettivi[fasciaTemp]}`;
            fetch(GOOGLE_API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
            .catch(error => mostraToast('Errore rete!', 'error'));
        }

        function annullaUltimo() {
            if(!confirm("Vuoi annullare l'ULTIMO voto di prova?")) return;
            mostraToast('Eliminazione...', 'warning');
            fetch(GOOGLE_API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'undo' }) })
            .then(() => { mostraToast('Voto rimosso.', 'error'); sincronizzaContatori(); });
        }

        function resetTotale() {
            if(prompt("Scrivi CONFERMO per svuotare il database di test:") === "CONFERMO") {
                mostraToast('Azzeramento...', 'warning');
                fetch(GOOGLE_API_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'clear_all', password: sysPassword }) })
                .then(() => { mostraToast('TEST AZZERATO.', 'error'); sincronizzaContatori(); });
            }
        }
    </script>
</body>
</html>
